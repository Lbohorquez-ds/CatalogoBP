<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

<body>

  <header class="header">
    <button id="menuBtn" class="menu-btn" aria-label="Abrir menú">☰</button>
    <img src="logo.jpeg" alt="Logo B&P Sanitarios" class="logo">

  <nav id="menu" class="menu">
    <button onclick="abrirPDF('catalogo-propio.pdf')">Propio</button>
    <button onclick="abrirPDF('dealer.pdf')">Dealer</button>

  <section class="ofertas">

    </div>

    <div class="ofertas-box">
      <img src="oferta.jpeg" alt="Oferta destacada" class="oferta-img">

  <div id="visor" class="visor">
    <div class="visor-top">
      <span>Catálogo</span>
      <button class="cerrar" onclick="cerrarPDF()">✖</button>
    </div>
    <iframe id="pdfFrame" title="Visor de PDF"></iframe>
